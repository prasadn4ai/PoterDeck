<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%);
      color: white; border-radius: 16px; overflow: hidden;
      -webkit-app-region: drag;
    }
    .container { text-align: center; }
    h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
    p { font-size: 14px; opacity: 0.8; margin-bottom: 24px; }
    .loader {
      width: 40px; height: 40px; margin: 0 auto;
      border: 3px solid rgba(255,255,255,0.3);
      border-top: 3px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .status { font-size: 12px; opacity: 0.6; margin-top: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>PoterDeck</h1>
    <p>AI Presentation System</p>
    <div class="loader"></div>
    <div class="status">Starting up...</div>
  </div>
</body>
</html>
